# CineHub / miuix-app 打包工作流
# 仅手动触发：Actions → Build → Run workflow
# - 默认打 Debug + Release APK 并上传 Artifact
# - 可选勾选 create_release：从当前分支创建 GitHub Release 并挂 APK

name: Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "创建 GitHub Release 并上传 APK"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Release 标签（如 v1.0.1，仅 create_release 时使用）"
        required: false
        type: string
        default: ""

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dkotlin.compiler.execution.strategy=in-process

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          validate-wrappers: true

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace --no-configuration-cache

      - name: Build Release APK
        run: ./gradlew :androidApp:assembleRelease --stacktrace --no-configuration-cache
        continue-on-error: true

      - name: Locate APK artifacts
        id: apk
        run: |
          set -e
          mkdir -p dist
          DEBUG_APK=$(find androidApp/build/outputs/apk -name "*.apk" -path "*/debug/*" | head -n 1 || true)
          RELEASE_APK=$(find androidApp/build/outputs/apk -name "*.apk" -path "*/release/*" | head -n 1 || true)
          if [ -n "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" dist/CineHub-debug.apk
            echo "debug=dist/CineHub-debug.apk" >> "$GITHUB_OUTPUT"
            echo "Found debug: $DEBUG_APK"
          else
            echo "No debug APK found" >&2
            find androidApp/build/outputs -type f 2>/dev/null || true
            exit 1
          fi
          if [ -n "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" dist/CineHub-release.apk
            echo "release=dist/CineHub-release.apk" >> "$GITHUB_OUTPUT"
            echo "Found release: $RELEASE_APK"
          fi
          ls -lh dist/

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

  desktop:
    name: Desktop JAR
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          validate-wrappers: true

      - name: Package Desktop
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS --stacktrace --no-configuration-cache
        continue-on-error: true

      - name: Collect desktop artifacts
        id: desktop
        run: |
          mkdir -p dist-desktop
          # Compose Desktop 输出通常在 build/compose/binaries
          find desktopApp/build -type f \( -name "*.deb" -o -name "*.msi" -o -name "*.dmg" -o -name "*.jar" \) \
            ! -path "*/tmp/*" 2>/dev/null | while read -r f; do
            cp -v "$f" dist-desktop/ || true
          done
          ls -lah dist-desktop/ || true
          count=$(find dist-desktop -type f | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Upload Desktop package
        if: steps.desktop.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-package
          path: dist-desktop/*
          if-no-files-found: ignore
          retention-days: 30

  release:
    name: GitHub Release
    needs: [android]
    if: ${{ inputs.create_release == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="build-$(date -u +%Y%m%d-%H%M%S)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
